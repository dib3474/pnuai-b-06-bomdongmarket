server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # 로컬 Docker에서는 재빌드 직후 이전 JS가 남지 않도록 정적 파일도 캐시하지 않습니다.
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # 배포 후에도 이전 JS 파일을 가리키는 HTML이 남지 않도록 캐시하지 않습니다.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # SPA 라우팅 — 새로고침 시에도 index.html로 폴백
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }
}
